suite: Per-Component Secret Injection
templates:
  - deployment-backend.yaml
  - deployment-frontend.yaml
  - deployment-worker.yaml
tests:
  # ── Backend ──────────────────────────────────────────────────────
  - it: backend should NOT have secretRef in envFrom
    template: deployment-backend.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: test-secret

  - it: backend should have configMapRef in envFrom
    template: deployment-backend.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: RELEASE-NAME-phase-config

  - it: backend should have _FILE env vars for file-based secrets
    template: deployment-backend.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SECRET_KEY_FILE
            value: /etc/phase/secrets/SECRET_KEY
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_PASSWORD_FILE
            value: /etc/phase/secrets/DATABASE_PASSWORD
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD_FILE
            value: /etc/phase/secrets/REDIS_PASSWORD

  - it: backend should have direct secretKeyRef env vars from secretConfigs
    template: deployment-backend.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GOOGLE_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: test-secret
                key: GOOGLE_CLIENT_ID
                optional: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: test-secret
                key: GITHUB_CLIENT_ID
                optional: true

  - it: backend should have projected volume with optional sources
    template: deployment-backend.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.volumes[0].projected.sources
          content:
            secret:
              name: test-secret
              optional: true
              items:
              - key: SECRET_KEY
                path: SECRET_KEY
      - contains:
          path: spec.template.spec.volumes[0].projected.sources
          content:
            secret:
              name: test-secret
              optional: true
              items:
              - key: DATABASE_PASSWORD
                path: DATABASE_PASSWORD

  - it: backend should have volume mount at /etc/phase/secrets
    template: deployment-backend.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: phase-secrets
            mountPath: /etc/phase/secrets
            readOnly: true

  # ── Frontend ─────────────────────────────────────────────────────
  - it: frontend should NOT have secretRef in envFrom
    template: deployment-frontend.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: test-secret

  - it: frontend should have configMapRef in envFrom
    template: deployment-frontend.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: RELEASE-NAME-phase-config

  - it: frontend should have _FILE env vars for file-based secrets
    template: deployment-frontend.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GOOGLE_CLIENT_SECRET_FILE
            value: /etc/phase/secrets/GOOGLE_CLIENT_SECRET
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_CLIENT_SECRET_FILE
            value: /etc/phase/secrets/GITHUB_CLIENT_SECRET

  - it: frontend should have projected volume with optional sources
    template: deployment-frontend.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.volumes[0].projected.sources
          content:
            secret:
              name: test-secret
              optional: true
              items:
              - key: GOOGLE_CLIENT_SECRET
                path: GOOGLE_CLIENT_SECRET

  - it: frontend should have volume mount at /etc/phase/secrets
    template: deployment-frontend.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: phase-secrets
            mountPath: /etc/phase/secrets
            readOnly: true

  - it: frontend NEXTAUTH_SECRET should be direct secretKeyRef (not file-mounted)
    template: deployment-frontend.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEXTAUTH_SECRET
            valueFrom:
              secretKeyRef:
                name: test-secret
                key: NEXTAUTH_SECRET
                optional: true
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEXTAUTH_SECRET_FILE
            value: /etc/phase/secrets/NEXTAUTH_SECRET
          any: true

  - it: frontend should NOT have DATABASE_PASSWORD (per-component isolation)
    template: deployment-frontend.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_PASSWORD_FILE
            value: /etc/phase/secrets/DATABASE_PASSWORD
          any: true

  # ── Worker ───────────────────────────────────────────────────────
  - it: worker should NOT have secretRef in envFrom
    template: deployment-worker.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: test-secret

  - it: worker should have _FILE env vars for file-based secrets
    template: deployment-worker.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SECRET_KEY_FILE
            value: /etc/phase/secrets/SECRET_KEY
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_PASSWORD_FILE
            value: /etc/phase/secrets/DATABASE_PASSWORD

  - it: worker should have direct secretKeyRef from secretConfigs
    template: deployment-worker.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_INTEGRATION_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: test-secret
                key: AWS_INTEGRATION_ACCESS_KEY_ID
                optional: true

  - it: worker should have projected volume with optional sources
    template: deployment-worker.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.volumes[0].projected.sources
          content:
            secret:
              name: test-secret
              optional: true
              items:
              - key: SECRET_KEY
                path: SECRET_KEY

  - it: worker should have volume mount at /etc/phase/secrets
    template: deployment-worker.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: phase-secrets
            mountPath: /etc/phase/secrets
            readOnly: true

  - it: worker should NOT have SSO secrets (per-component isolation)
    template: deployment-worker.yaml
    set:
      phaseSecrets: test-secret
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: GOOGLE_CLIENT_SECRET_FILE
            value: /etc/phase/secrets/GOOGLE_CLIENT_SECRET
          any: true
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: GOOGLE_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: test-secret
                key: GOOGLE_CLIENT_ID
                optional: true
          any: true
