# Example: ArgoCD Cluster Secret with Required Labels
# 
# ArgoCD requires the label 'argocd.argoproj.io/secret-type: cluster' to recognize
# cluster secrets. This example shows how to use the template.metadata feature
# to add required labels to managed secrets.

apiVersion: secrets.phase.dev/v1alpha1
kind: PhaseSecret
metadata:
  name: argocd-production-cluster
  namespace: argocd
spec:
  # Phase configuration
  phaseApp: "my-platform"
  phaseAppEnv: "production"
  phaseHost: "https://console.phase.dev"
  
  authentication:
    serviceToken:
      serviceTokenSecretReference:
        secretName: phase-service-token
        secretNamespace: argocd
  
  managedSecretReferences:
    - secretName: prod-cluster-credentials
      secretNamespace: argocd
      secretType: Opaque
      
      # Template metadata for ArgoCD integration
      template:
        metadata:
          labels:
            # Required by ArgoCD to recognize this as a cluster secret
            argocd.argoproj.io/secret-type: cluster
            # Additional organizational labels
            environment: production
            cluster: eks-prod-us-east-1
            team: platform-engineering
          annotations:
            description: "Production EKS cluster credentials"
            managed-by: phase-secrets-operator
            contact: platform-team@example.com
            rotation-policy: "90d"
      
      # Map Phase secrets to ArgoCD expected format
      processors:
        CLUSTER_NAME:
          asName: name
          type: plain
        CLUSTER_SERVER:
          asName: server
          type: plain
        CLUSTER_CONFIG:
          asName: config
          type: plain
