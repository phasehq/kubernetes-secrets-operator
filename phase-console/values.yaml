# Global settings
global:
  host: "localhost"
  httpProtocol: "https://"
  version: latest
  images:
    frontend:
      repository: phasehq/frontend
    backend:
      repository: phasehq/backend
  external:
    enabled: false  # DEPRECATED: no longer used by the chart; use `database.external` and `redis.external` instead.
  # Examples:
    # External service patterns (internal vs external Postgres/Redis):
    # - Both Postgres & Redis inside the cluster:
    #     database.external = false
    #     redis.external = false
    # - Both Postgres & Redis outside the cluster:
    #     database.external = true
    #     redis.external = true
    # - External Postgres only (Redis inside cluster):
    #     database.external = true
    #     redis.external = false
    # - External Redis only (Postgres inside cluster):
    #     database.external = false
    #     redis.external = true

sso:
  providers: "google,github,gitlab"

# Docs: https://docs.phase.dev/self-hosting/configuration/envars
phaseSecrets: phase-console-secret

# License configuration
license:
  # Offline license key for enterprise deployments
  # See PHASE_LICENSE_OFFLINE in: https://docs.phase.dev/self-hosting/configuration/envars#additional-environment-variables
  offline: ""

# Optional: Comma-separated list of email domains to restrict logins
userEmailDomainWhitelist: ""
# Optional: Custom message displayed on the login screen (max 512 chars)
loginBannerText: ""
# Enable debug mode (never use in production)
debug: false

# Ingress settings
ingress:
  enabled: true
  className: "nginx"
  # host: "your-domain.com"
  tls: []
  annotations: {}

# Cert manager settings
certManager:
  enabled: false
  issuerName: ""
  issuerKind: ""

app:
  frontend:
    image:
      pullPolicy: IfNotPresent
    replicaCount: 1
    service:
      type: ClusterIP
      port: 3000
    readinessProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 5
    resources:
      requests:
        cpu: 500m
        memory: 1Gi

  backend:
    image:
      pullPolicy: IfNotPresent
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
    readinessProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 5
    livenessProbe:
      enabled: true
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 5
    # Number of Gunicorn worker processes (auto-calculated from CPU cores if unset, capped at 8)
    gunicornWorkers: ""
    # Rate limit for API requests (e.g. "100/minute")
    rateLimitDefault: ""
    resources:
      requests:
        cpu: 500m
        memory: 1Gi

  worker:
    image:
      pullPolicy: IfNotPresent
    replicaCount: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi

  migrations:
    image:
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 125m
        memory: 256Mi

database:
  external: false
  host: "{{ .Release.Name }}-postgres"
  port: "5432"
  name: "postgres-db-name"
  user: "postgres-user"
  # Set SSL/TLS mode for Postgres connections made by initContainers and apps
  # Accepted values include: disable, allow, prefer, require, verify-ca, verify-full
  sslmode: ""
  # Enable SSL/TLS for database connections (default: False)
  ssl: false
  # Path to CA certificate bundle for verifying database TLS certificate
  sslCaPath: ""
  image:
    repository: postgres
    tag: 15.4-alpine3.17
  pullPolicy: IfNotPresent
  service:
    port: 5432
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: 500m
      memory: 1Gi

# Redis settings
redis:
  external: false
  host: "{{ .Release.Name }}-redis"
  port: "6379"
  # Enable TLS when connecting to external Redis (e.g., managed services)
  ssl: false
  # Optional user for Redis ACL (e.g., managed Redis/Valkey)
  user: ""
  # Path to CA certificate bundle for Redis SSL verification
  sslCaPath: ""
  image:
    repository: redis
    tag: alpine3.19
  pullPolicy: IfNotPresent
  service:
    port: 6379
  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

# SMTP email gateway settings
# Docs: https://docs.phase.dev/self-hosting/configuration/envars#email-gateway-configuration
smtp:
  server: ""
  port: ""
  username: ""
  defaultFromEmail: ""
  timeout: ""
  useTls: ""
  useSsl: ""

# Specifies whether a service account should be created.
serviceAccount:
  create: false
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template (e.g., <release-name>-sa)
  # If not set and create is false, the default service account in the namespace will be used.
  # If set, this name will be used. If create is also true, this will be the name of the SA created.
  # For IRSA, you would set create to false (if SA already exists) or true (if chart should manage it)
  # and set this name to your existing/desired IRSA-enabled service account name.
  name: "" # Example: "phase-backend-sa"
  # Annotations to add to the service account (e.g., for AWS IRSA). More info: https://aws.amazon.com/blogs/containers/cross-account-iam-roles-for-kubernetes-service-accounts/
  annotations: {}
  #  "eks.amazonaws.com/role-arn": "arn:aws:iam::123456789012:role/phase-secrets-manager-role"

# Autoscaling settings
autoscaling:
  frontend:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  backend:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  worker:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

# Pod Disruption Budget settings
podDisruptionBudget:
  backend:
    enabled: false
    # minAvailable: 1
    maxUnavailable: 1
  frontend:
    enabled: false
    # minAvailable: 1
    maxUnavailable: 1
  worker:
    enabled: false
    # minAvailable: 1
    maxUnavailable: 1

# Keys in `secrets` are mounted as files at /etc/phase/secrets/<KEY>
# and exposed via <KEY>_FILE env vars (get_secret() pattern).
# All keys use optional: true so missing keys are silently ignored.
secrets:
  backend:
    - SECRET_KEY
    - SERVER_SECRET
    - DATABASE_PASSWORD
    - REDIS_PASSWORD
    - SMTP_PASSWORD
    - GOOGLE_CLIENT_SECRET
    - GITHUB_CLIENT_SECRET
    - GITHUB_ENTERPRISE_CLIENT_SECRET
    - GITLAB_CLIENT_SECRET
    - AUTHENTIK_CLIENT_SECRET
    - GOOGLE_OIDC_CLIENT_SECRET
    - JUMPCLOUD_OIDC_CLIENT_SECRET
    - ENTRA_ID_OIDC_CLIENT_SECRET
    - OKTA_OIDC_CLIENT_SECRET
    - GITHUB_INTEGRATION_CLIENT_SECRET
    - GITHUB_ENTERPRISE_INTEGRATION_CLIENT_SECRET
    - AWS_INTEGRATION_SECRET_ACCESS_KEY
  worker:
    - SECRET_KEY
    - SERVER_SECRET
    - DATABASE_PASSWORD
    - REDIS_PASSWORD
    - SMTP_PASSWORD
    - AWS_INTEGRATION_SECRET_ACCESS_KEY
  frontend:
    - GOOGLE_CLIENT_SECRET
    - GITHUB_CLIENT_SECRET
    - GITHUB_ENTERPRISE_CLIENT_SECRET
    - GITLAB_CLIENT_SECRET
    - AUTHENTIK_CLIENT_SECRET
    - GOOGLE_OIDC_CLIENT_SECRET
    - JUMPCLOUD_OIDC_CLIENT_SECRET
    - ENTRA_ID_OIDC_CLIENT_SECRET
    - OKTA_OIDC_CLIENT_SECRET

# Non-secret configs
secretConfigs:
  backend:
    - GOOGLE_CLIENT_ID
    - GITHUB_CLIENT_ID
    - GITHUB_ENTERPRISE_CLIENT_ID
    - GITLAB_CLIENT_ID
    - AUTHENTIK_CLIENT_ID
    - GOOGLE_OIDC_CLIENT_ID
    - JUMPCLOUD_OIDC_CLIENT_ID
    - ENTRA_ID_OIDC_CLIENT_ID
    - OKTA_OIDC_CLIENT_ID
    - ENTRA_ID_OIDC_TENANT_ID
    - OKTA_OIDC_ISSUER
    - AUTHENTIK_URL
    - AUTHENTIK_APP_SLUG
    - GITLAB_AUTH_URL
    - GITHUB_ENTERPRISE_BASE_URL
    - GITHUB_ENTERPRISE_API_URL
    - GITHUB_INTEGRATION_CLIENT_ID
    - GITHUB_ENTERPRISE_INTEGRATION_CLIENT_ID
    - AWS_INTEGRATION_ACCESS_KEY_ID
  worker:
    - AWS_INTEGRATION_ACCESS_KEY_ID
  frontend:
    - NEXTAUTH_SECRET # This is needs to an environemnt variable
    - GOOGLE_CLIENT_ID
    - GITHUB_CLIENT_ID
    - GITHUB_ENTERPRISE_CLIENT_ID
    - GITLAB_CLIENT_ID
    - AUTHENTIK_CLIENT_ID
    - GOOGLE_OIDC_CLIENT_ID
    - JUMPCLOUD_OIDC_CLIENT_ID
    - ENTRA_ID_OIDC_CLIENT_ID
    - OKTA_OIDC_CLIENT_ID
    - ENTRA_ID_OIDC_TENANT_ID
    - OKTA_OIDC_ISSUER
    - AUTHENTIK_URL
    - AUTHENTIK_APP_SLUG
    - GITLAB_AUTH_URL
    - GITHUB_ENTERPRISE_BASE_URL
    - GITHUB_ENTERPRISE_API_URL
    - GITHUB_INTEGRATION_CLIENT_ID
    - GITHUB_ENTERPRISE_INTEGRATION_CLIENT_ID

# Security context defaults
securityContext:
  # Pod-level security context for app containers (frontend, backend, worker)
  pod:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  # Container-level security context applied to all containers
  container:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
