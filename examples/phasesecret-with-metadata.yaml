# Example PhaseSecret with Metadata Templating
# This demonstrates the metadata templating feature for managed secrets
# Use case: ArgoCD cluster secret integration

apiVersion: secrets.phase.dev/v1alpha1
kind: PhaseSecret
metadata:
  name: argocd-cluster-credentials
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cluster-secret
    app.kubernetes.io/component: cluster-credentials
spec:
  # Phase configuration
  phaseApp: "production-infrastructure"
  phaseAppEnv: "production"
  phaseAppEnvPath: "/argocd/clusters"
  phaseHost: "https://console.phase.dev"
  
  # Authentication
  authentication:
    serviceToken:
      serviceTokenSecretReference:
        secretName: phase-service-token
        secretNamespace: default
  
  # Polling interval (seconds)
  pollingInterval: 60
  
  # Managed secrets with metadata templating
  managedSecretReferences:
    # ArgoCD cluster secret with required labels
    - secretName: production-eks-cluster
      secretNamespace: argocd
      secretType: Opaque
      
      # Metadata template - user-defined labels and annotations
      template:
        metadata:
          # Labels are merged with operator-managed labels
          # Operator always sets:
          #   - app.kubernetes.io/managed-by: phase-secrets-operator
          #   - app.kubernetes.io/name: phase-secret
          #   - secrets.phase.dev/phasesecret: <cr-name>
          labels:
            # ArgoCD requires this label to recognize cluster secrets
            argocd.argoproj.io/secret-type: cluster
            
            # Additional organizational labels
            environment: production
            team: platform-engineering
            cost-center: infrastructure
            region: us-east-1
            
          # Annotations for operational metadata
          # No restrictions on annotation keys
          annotations:
            # Documentation
            description: "EKS cluster credentials for production workloads"
            
            # Operational policies
            rotation-policy: "90d"
            backup-required: "true"
            
            # Contact information
            contact: "platform-team@example.com"
            oncall: "https://oncall.example.com/platform"
            
            # Links to external systems
            runbook: "https://wiki.example.com/runbooks/argocd-cluster-auth"
            dashboard: "https://grafana.example.com/d/cluster-health"
            
      # Secret data processors
      processors:
        CLUSTER_URL:
          asName: server
          type: plain
        CLUSTER_TOKEN:
          asName: config
          type: plain
        CLUSTER_CA_CERT:
          asName: tlsClientConfig.caData
          type: base64

---
# Example: Multiple secrets with different metadata
apiVersion: secrets.phase.dev/v1alpha1
kind: PhaseSecret
metadata:
  name: multi-secret-example
  namespace: default
spec:
  phaseApp: "my-application"
  phaseAppEnv: "production"
  phaseHost: "https://console.phase.dev"
  
  authentication:
    serviceToken:
      serviceTokenSecretReference:
        secretName: phase-service-token
        secretNamespace: default
  
  managedSecretReferences:
    # Database credentials with specific labels
    - secretName: postgres-credentials
      secretNamespace: databases
      secretType: Opaque
      template:
        metadata:
          labels:
            database-type: postgresql
            environment: production
            backup-enabled: "true"
          annotations:
            rotation-schedule: "monthly"
            owner: "database-team@example.com"
      
    # API keys with different labels
    - secretName: external-api-keys
      secretNamespace: default
      secretType: Opaque
      template:
        metadata:
          labels:
            secret-category: api-credentials
            vendor: external-service
          annotations:
            expires: "2026-12-31"
            renewal-process: "https://docs.example.com/api-key-renewal"
    
    # TLS certificate without template (backward compatibility)
    - secretName: app-tls-cert
      secretNamespace: default
      secretType: kubernetes.io/tls
      # No template - will only have operator-managed labels

---
# Example: Cert-Manager integration
apiVersion: secrets.phase.dev/v1alpha1
kind: PhaseSecret
metadata:
  name: tls-certificate-secret
  namespace: cert-manager
spec:
  phaseApp: "tls-certificates"
  phaseAppEnv: "production"
  phaseHost: "https://console.phase.dev"
  
  authentication:
    serviceToken:
      serviceTokenSecretReference:
        secretName: phase-service-token
        secretNamespace: default
  
  managedSecretReferences:
    - secretName: example-com-tls
      secretNamespace: cert-manager
      secretType: kubernetes.io/tls
      template:
        metadata:
          labels:
            # Cert-Manager labels
            cert-manager.io/certificate-name: example-com
            cert-manager.io/common-name: "example.com"
            cert-manager.io/issuer-kind: ClusterIssuer
            cert-manager.io/issuer-name: letsencrypt-prod
          annotations:
            cert-manager.io/certificate-revision: "1"
            cert-manager.io/alt-names: "*.example.com,example.com"