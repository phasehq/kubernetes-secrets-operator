# Example: Cert-Manager TLS Certificate Secret
#
# This example demonstrates using metadata templates with TLS secrets
# that are managed by cert-manager or similar certificate management systems.

apiVersion: secrets.phase.dev/v1alpha1
kind: PhaseSecret
metadata:
  name: api-tls-certificate
  namespace: default
spec:
  phaseApp: "api-service"
  phaseAppEnv: "production"
  phaseHost: "https://console.phase.dev"
  
  authentication:
    serviceToken:
      serviceTokenSecretReference:
        secretName: phase-service-token
        secretNamespace: default
  
  managedSecretReferences:
    - secretName: api-tls-cert
      secretNamespace: default
      secretType: kubernetes.io/tls
      
      template:
        metadata:
          labels:
            cert-manager.io/certificate-name: api-prod-cert
            app: api-service
            environment: production
          annotations:
            cert-manager.io/common-name: api.example.com
            cert-manager.io/issuer-name: letsencrypt-prod
            description: "TLS certificate for API service"
      
      processors:
        TLS_CERT:
          asName: tls.crt
          type: base64
        TLS_KEY:
          asName: tls.key
          type: base64
